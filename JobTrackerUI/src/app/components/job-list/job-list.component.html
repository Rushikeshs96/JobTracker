<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Applications</h2>
        <button mat-raised-button color="primary" routerLink="/jobs/new">Add New Job</button>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Company</th>
                <th>Job Title</th>
                <th>Status</th>
                <th>Date Applied</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let job of jobs">
                <td>{{ job.companyName }}</td>
                <td>{{ job.jobTitle }}</td>
                <td>{{ job.status }}</td>
                <td>{{ job.dateApplied | date:'shortDate' }}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-2" (click)="editJob(job.id)">
                        <i class="bi bi-pencil"></i> Edit
                    </button>
                    <button class="btn btn-danger btn-sm" (click)="deleteJob(job.id)">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </td>
            </tr>

        </tbody>
    </table>
</div>
