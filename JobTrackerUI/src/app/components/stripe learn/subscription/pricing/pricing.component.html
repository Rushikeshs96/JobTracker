<div class="container mt-5">
    <div class="text-center mb-5">
        <h1>Choose Your Plan</h1>
        <p class="text-muted">Select the best option for your career growth.</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <!-- Loop through plans -->
        <div class="col" *ngFor="let plan of plans">
            <div class="card h-100 shadow-sm border-primary" [class.border-2]="plan.name === 'Standard'">
                <div class="card-body text-center p-4">
                    <div *ngIf="plan.name === 'Standard'" class="badge bg-primary mb-2">Most Popular</div>
                    <h2 class="card-title">{{ plan.name }}</h2>
                    <p class="h3 text-primary my-3">${{ plan.price }} <span class="h6 text-muted">/ month</span></p>

                    <ul class="list-unstyled my-4 text-start">
                        <li *ngFor="let feature of plan.features" class="mb-2">
                            <i class="bi bi-check-circle-fill text-success me-2"></i> ✔ {{ feature }}
                        </li>
                    </ul>

                    <button class="btn w-100 py-2" [class.btn-primary]="plan.name !== 'Basic'"
                        [class.btn-outline-primary]="plan.name === 'Basic'" (click)="subscribe(plan)">
                        Get Started
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <hr style="max-width: 400px; margin: auto;">
        <p class="text-muted mt-3">Already a premium member?</p>
        <button class="btn btn-link" (click)="manage()">Manage your subscription and billing</button>
    </div>
</div>
