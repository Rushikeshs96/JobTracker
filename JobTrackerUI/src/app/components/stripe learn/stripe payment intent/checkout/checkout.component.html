<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-4" style="max-width: 450px; width: 100; border-radius: 12px;">

        <!-- 🧾 Header -->
        <h3 class="mb-1">💳 Secure Checkout</h3>
        <p class="text-muted mb-4">
            Complete your payment to unlock premium features
        </p>

        <!-- 💰 Order Summary -->
        <div class="bg-light p-3 rounded mb-4">
            <div class="d-flex justify-content-between mb-2">
                <span>Product</span>
                <span>Job Tracker Premium</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span>Price</span>
                <span>$50.00</span>
            </div>
            <hr class="my-2" />
            <div class="d-flex justify-content-between fw-bold">
                <span>Total</span>
                <span>$50.00</span>
            </div>
        </div>

        <!-- 🔐 Payment -->
        <div *ngIf="elementsOptions.clientSecret; else loading">

            <!-- Stripe Element -->
            <div class="border rounded p-3 bg-light">
                <ngx-stripe-payment [elementsOptions]="elementsOptions"></ngx-stripe-payment>
            </div>

            <!-- ✅ Button -->
            <button class="btn btn-primary w-100 mt-4" (click)="confirmPayment()" [disabled]="isProcessing()">
                <span *ngIf="!isProcessing()">Pay $50.00</span>
                <span *ngIf="isProcessing()" class="spinner-border spinner-border-sm me-2"></span>
                <span *ngIf="isProcessing()">Processing...</span>
            </button>
        </div>

        <!-- ⏳ Loading -->
        <ng-template #loading>
            <div class="text-center py-4">
                <div class="spinner-border text-primary mb-3"></div>
                <p class="mb-0">Loading secure payment form...</p>
            </div>
        </ng-template>

    </div>
</div>
